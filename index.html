<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حروف مع عزيز - النسخة الأصلية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- شاشة البداية -->
        <div class="start-screen" id="startScreen">
            <div class="logo">
                <h1>🎮 حروف مع عزيز</h1>
                <p class="subtitle">النسخة المطابقة 100%</p>
            </div>
            
            <div class="setup-area">
                <h2>إعدادات اللعبة</h2>
                
                <div class="team-setup">
                    <div class="team-input team1-bg">
                        <label>اسم الفريق الأزرق:</label>
                        <input type="text" id="team1Name" value="فريق عزيز" placeholder="أدخل اسم الفريق">
                    </div>
                    
                    <div class="team-input team2-bg">
                        <label>اسم الفريق الأحمر:</label>
                        <input type="text" id="team2Name" value="فريق متعب" placeholder="أدخل اسم الفريق">
                    </div>
                </div>
                
                <div class="game-options">
                    <h3>إعدادات إضافية</h3>
                    
                    <div class="option">
                        <label>حجم الشبكة:</label>
                        <select id="gridSize">
                            <option value="5">5 × 5</option>
                            <option value="6">6 × 6</option>
                            <option value="7">7 × 7</option>
                        </select>
                    </div>
                </div>
                
                <button class="start-btn" onclick="startGame()">🚀 ابدأ اللعبة</button>
            </div>
            
            <!-- لوحة المتصدرين -->
            <div class="leaderboard-panel">
                <h3>🏆 قاعة المشاهير</h3>
                <div id="leaderboardList"></div>
            </div>
        </div>
        
        <!-- شاشة اللعبة الرئيسية -->
        <div class="game-screen hidden" id="gameScreen">
            <!-- رأس اللعبة -->
            <div class="game-header">
                <div class="team-card team1" id="team1Card">
                    <div class="team-info">
                        <span class="team-label">الفريق الأزرق</span>
                        <span class="team-name" id="team1NameDisplay">عزيز</span>
                    </div>
                    <div class="team-score" id="team1Score">0</div>
                </div>
                
                <div class="round-info">
                    <div class="turn-indicator" id="turnIndicator">
                        <span class="turn-label">الدور:</span>
                        <span class="turn-team" id="currentTeamDisplay">عزيز</span>
                    </div>
                </div>
                
                <div class="team-card team2" id="team2Card">
                    <div class="team-info">
                        <span class="team-label">الفريق الأحمر</span>
                        <span class="team-name" id="team2NameDisplay">متعب</span>
                    </div>
                    <div class="team-score" id="team2Score">0</div>
                </div>
            </div>
            
            <!-- شبكة اللعب -->
            <div class="game-board">
                <div class="grid-container" id="grid"></div>
            </div>
            
            <!-- لوحة تحكم المقدم -->
            <div class="host-controls">
                <h3>🎙️ تحكم المقدم</h3>
                <div class="host-buttons">
                    <button class="host-btn correct-btn" onclick="markCellCorrect()" id="correctBtn" disabled>
                        ✅ إجابة صحيحة
                    </button>
                    <button class="host-btn wrong-btn" onclick="markCellWrong()" id="wrongBtn" disabled>
                        ❌ إجابة خاطئة
                    </button>
                    <button class="host-btn cancel-btn" onclick="cancelSelection()" id="cancelBtn" disabled>
                        🔄 إلغاء الاختيار
                    </button>
                </div>
                <p class="host-instruction" id="hostInstruction">
                    اختر حرفاً من الشبكة لبدء الجولة
                </p>
            </div>
            
            <!-- أزرار التحكم -->
            <div class="control-panel">
                <button class="control-btn reset" onclick="resetGame()">🔄 لعبة جديدة</button>
                <button class="control-btn home" onclick="showStartScreen()">🏠 القائمة الرئيسية</button>
            </div>
        </div>
        
        <!-- شاشة الفوز -->
        <div class="win-screen hidden" id="winScreen">
            <div class="win-card">
                <h2>🎉 فوز عظيم! 🎉</h2>
                <div class="winner-trophy">🏆</div>
                <p class="winner-message" id="winMessage"></p>
                <div class="win-buttons">
                    <button class="play-again" onclick="playAgain()">العب مرة أخرى</button>
                    <button class="main-menu" onclick="showStartScreen()">القائمة الرئيسية</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
