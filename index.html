<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حروف مع العزيز - النسخة المطورة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <!-- شاشة البداية -->
        <div class="start-screen" id="startScreen">
            <h1 class="game-title">🎮 حروف مع العزيز</h1>
            
            <!-- اختيار المستوى -->
            <div class="level-selector">
                <h3>🎯 اختر المستوى:</h3>
                <div class="level-buttons">
                    <button class="level-btn easy" onclick="selectLevel('easy')">سهل</button>
                    <button class="level-btn medium" onclick="selectLevel('medium')">متوسط</button>
                    <button class="level-btn hard" onclick="selectLevel('hard')">صعب</button>
                </div>
                <p class="selected-level" id="selectedLevel">المستوى: سهل (5×5)</p>
            </div>

            <div class="players-setup">
                <div class="input-group">
                    <label>👤 اسم الفريق الأزرق:</label>
                    <input type="text" id="team1Name" value="النسور الزرقاء" placeholder="أدخل اسم الفريق">
                </div>
                <div class="input-group">
                    <label>👥 اسم الفريق الأحمر:</label>
                    <input type="text" id="team2Name" value="الصقور الحمراء" placeholder="أدخل اسم الفريق">
                </div>
                <button class="start-btn" onclick="startGame()">🚀 بدء اللعبة</button>
            </div>

            <!-- لوحة المتصدرين -->
            <div class="leaderboard" id="leaderboard">
                <h3>🏆 آخر الفائزين</h3>
                <div id="leaderboardList"></div>
            </div>
        </div>

        <!-- شاشة اللعبة الرئيسية -->
        <div class="game-screen hidden" id="gameScreen">
            <div class="game-header">
                <div class="team-score team1" id="team1Display">
                    <span class="team-name" id="team1NameDisplay">النسور الزرقاء</span>
                    <span class="score" id="team1Score">0</span>
                </div>
                
                <div class="turn-indicator" id="turnIndicator">
                    <span class="turn-team" id="currentTeamDisplay">الفريق الأزرق</span>
                    <div class="timer" id="timerDisplay">⏱️ 30</div>
                </div>
                
                <div class="team-score team2" id="team2Display">
                    <span class="team-name" id="team2NameDisplay">الصقور الحمراء</span>
                    <span class="score" id="team2Score">0</span>
                </div>
            </div>

            <!-- منطقة السؤال -->
            <div class="question-area" id="questionArea">
                <div class="question-box">
                    <h3>❓ السؤال:</h3>
                    <p id="questionText">اضغط على أي خلية للحصول على سؤال</p>
                </div>
                <div class="answer-area hidden" id="answerArea">
                    <input type="text" id="answerInput" placeholder="اكتب إجابتك هنا..." autocomplete="off">
                    <button onclick="checkAnswer()" id="submitAnswer">✅ تأكيد</button>
                </div>
            </div>

            <!-- شبكة اللعب -->
            <div class="grid-container" id="grid"></div>

            <!-- أزرار التحكم -->
            <div class="control-buttons">
                <button class="reset-btn" onclick="resetGame()">🔄 لعبة جديدة</button>
                <button class="home-btn" onclick="showStartScreen()">🏠 الرئيسية</button>
            </div>
        </div>

        <!-- شاشة الفوز -->
        <div class="win-screen hidden" id="winScreen">
            <div class="win-content">
                <h2>🎉 فوز!!! 🎉</h2>
                <p id="winMessage"></p>
                <div class="win-buttons">
                    <button onclick="playAgain()">🔄 العب مرة أخرى</button>
                    <button onclick="showStartScreen()">🏠 الرئيسية</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
